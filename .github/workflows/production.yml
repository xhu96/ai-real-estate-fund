name: production-gates
on:
  push:
    branches: [main]
  pull_request:
jobs:
  production-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: python -m compileall -q src app/backend tests
      - run: python -m unittest discover -s tests
      - run: APP_ENV=ci python -m ai_real_estate_fund readiness --json --strict
      - run: python scripts/smoke_test.py
      - run: python scripts/release_manifest.py --out dist/release-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: dist/release-manifest.json
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-real-estate-fund:test
