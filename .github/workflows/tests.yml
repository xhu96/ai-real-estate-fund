name: tests
on:
  push:
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[api,dev]"
      - run: python -m compileall -q src app/backend tests
      - run: python -m pytest -q
      - run: APP_ENV=ci python -m ai_real_estate_fund readiness --json --strict
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e ".[api]"
      - run: PYTHONPATH=src:. python -c "from app.backend.main import create_app; app=create_app(); print(app.title, len(app.routes))"
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: app/frontend
      - run: npm run build
        working-directory: app/frontend
